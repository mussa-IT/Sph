<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Main Shape - Layered Hexagon -->
  <path d="M256 32 L448 144 L448 368 L256 480 L64 368 L64 144 Z" fill="url(#logoGradient)" filter="url(#glow)" opacity="0.9"/>

  <!-- Inner Shape -->
  <path d="M256 72 L416 168 L416 344 L256 440 L96 344 L96 168 Z" fill="#ffffff" opacity="0.95"/>

  <!-- Central Element - Abstract "S" / Project Symbol -->
  <path d="M256 140 
           C280 140, 300 160, 300 180 
           C300 200, 280 210, 256 220
           C232 230, 212 240, 212 260
           C212 280, 232 300, 256 300
           C280 300, 300 290, 300 270" 
        stroke="url(#logoGradient)" 
        stroke-width="24" 
        stroke-linecap="round" 
        fill="none"/>

  <!-- Connection Points -->
  <circle cx="256" cy="140" r="12" fill="#7c3aed"/>
  <circle cx="256" cy="300" r="12" fill="#06b6d4"/>

  <!-- Side Nodes (representing collaboration) -->
  <circle cx="160" cy="210" r="8" fill="#2563eb" opacity="0.8"/>
  <circle cx="352" cy="210" r="8" fill="#2563eb" opacity="0.8"/>

  <!-- Connecting Lines -->
  <path d="M160 210 L224 180" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M352 210 L288 180" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
</svg>
