<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <defs>
    <linearGradient id="appleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="180" height="180" rx="40" fill="url(#appleGradient)"/>
  
  <!-- Inner Glow Effect -->
  <rect x="10" y="10" width="160" height="160" rx="30" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- Central Logo Icon -->
  <g transform="translate(90, 90)">
    <!-- Hexagon Shape -->
    <path d="M0 -50 L43.3 -25 L43.3 25 L0 50 L-43.3 25 L-43.3 -25 Z" fill="rgba(255,255,255,0.95)"/>
    
    <!-- Inner Path (S-shape) -->
    <path d="M0 -30 C15 -30, 20 -20, 20 -10 C20 0, 10 5, 0 10 C-10 15, -20 20, -20 30 C-20 40, -10 45, 0 45" 
          stroke="url(#appleGradient)" 
          stroke-width="8" 
          stroke-linecap="round" 
          fill="none"/>
    
    <!-- Accent Dots -->
    <circle cx="0" cy="-30" r="5" fill="#7c3aed"/>
    <circle cx="0" cy="45" r="5" fill="#06b6d4"/>
  </g>
</svg>
