<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="64" height="64" rx="16" fill="url(#faviconGradient)"/>
  
  <!-- Smart Project Hub Cube Icon -->
  <g transform="translate(12, 16)">
    <!-- Main Cube Structure -->
    <path d="M 5 4 L 20 0 L 20 12 L 5 16 Z" fill="white" opacity="0.9"/>
    <path d="M 20 0 L 35 4 L 35 16 L 20 12 Z" fill="white" opacity="0.8"/>
    <path d="M 5 16 L 20 12 L 35 16 L 20 20 Z" fill="white" opacity="0.7"/>
    
    <!-- Center Accent -->
    <circle cx="20" cy="10" r="2.5" fill="url(#accentGradient)"/>
    
    <!-- Connection Points -->
    <circle cx="5" cy="4" r="1.5" fill="#1e40af"/>
    <circle cx="35" cy="4" r="1.5" fill="#3b82f6"/>
    <circle cx="5" cy="16" r="1.5" fill="#1e40af"/>
    <circle cx="35" cy="16" r="1.5" fill="#3b82f6"/>
    
    <!-- Connection Lines -->
    <path d="M 5 4 L 20 0 M 20 0 L 35 4 M 5 16 L 20 12 L 35 16" 
          stroke="white" stroke-width="1" fill="none" opacity="0.4"/>
  </g>
</svg>
