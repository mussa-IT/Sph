<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <!-- Dark Blue, Blue, Light Blue Gradient Definitions -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="logoShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.1"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Glow Effect -->
    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Logo Icon -->
  <g id="logoIcon">
    <!-- Main Cube Structure -->
    <path d="M 20 15 L 35 8 L 35 22 L 20 29 Z" fill="url(#primaryGradient)" opacity="0.9"/>
    <path d="M 35 8 L 50 15 L 50 29 L 35 22 Z" fill="url(#primaryGradient)" opacity="0.8"/>
    <path d="M 20 29 L 35 22 L 50 29 L 35 36 Z" fill="url(#primaryGradient)" opacity="0.7"/>
    
    <!-- Accent Elements -->
    <circle cx="35" cy="22" r="3" fill="url(#accentGradient)" filter="url(#logoGlow)"/>
    
    <!-- Connection Lines -->
    <path d="M 20 15 L 35 8 M 35 8 L 50 15 M 20 29 L 35 22 L 50 29" 
          stroke="url(#primaryGradient)" stroke-width="1.5" fill="none" opacity="0.6"/>
    
    <!-- Smart Nodes -->
    <circle cx="20" cy="15" r="2" fill="#1e40af" opacity="0.8"/>
    <circle cx="50" cy="15" r="2" fill="#3b82f6" opacity="0.8"/>
    <circle cx="20" cy="29" r="2" fill="#1e40af" opacity="0.8"/>
    <circle cx="50" cy="29" r="2" fill="#3b82f6" opacity="0.8"/>
  </g>
  
  <!-- Brand Text -->
  <g id="brandText">
    <!-- Smart -->
    <text x="65" y="25" font-family="'Inter', system-ui, -apple-system, sans-serif" 
          font-size="18" font-weight="700" fill="#0f172a">Smart</text>
    
    <!-- Project -->
    <text x="65" y="42" font-family="'Inter', system-ui, -apple-system, sans-serif" 
          font-size="18" font-weight="700" fill="#0f172a">Project</text>
    
    <!-- Hub with Gradient -->
    <text x="140" y="35" font-family="'Inter', system-ui, -apple-system, sans-serif" 
          font-size="20" font-weight="800" fill="url(#primaryGradient)">Hub</text>
  </g>
  
  <!-- Subtle Background Pattern -->
  <rect x="0" y="0" width="240" height="60" fill="none" stroke="url(#primaryGradient)" 
        stroke-width="0.5" opacity="0.2" rx="8"/>
</svg>
