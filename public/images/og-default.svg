<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="ogGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.5" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#ogGradient)"/>
  
  <!-- Gradient Orbs -->
  <circle cx="200" cy="200" r="300" fill="url(#accentGradient)" opacity="0.3"/>
  <circle cx="1000" cy="500" r="250" fill="url(#accentGradient)" opacity="0.2"/>

  <!-- Logo Placeholder -->
  <g transform="translate(550, 200) scale(0.5)">
    <path d="M128 16 L240 80 L240 184 L128 248 L16 184 L16 80 Z" fill="#7c3aed" opacity="0.9"/>
    <path d="M128 36 L220 90 L220 174 L128 228 L36 174 L36 90 Z" fill="#ffffff" opacity="0.95"/>
    <path d="M128 70 C140 70, 150 80, 150 90 C150 100, 140 105, 128 110 C116 115, 106 120, 106 130 C106 140, 116 150, 128 150" 
          stroke="url(#accentGradient)" stroke-width="12" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Text -->
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" text-anchor="middle" fill="#f8fafc">
    Smart Project Hub
  </text>
  <text x="600" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" text-anchor="middle" fill="#94a3b8">
    Turn Ideas Into Real Projects With AI
  </text>
</svg>
