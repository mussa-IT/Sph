<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="compactGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="compactAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    
    <filter id="compactGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Compact Logo Icon -->
  <g transform="translate(5, 8)">
    <!-- Main Cube -->
    <path d="M 5 4 L 15 0 L 15 8 L 5 12 Z" fill="url(#compactGradient)" opacity="0.9"/>
    <path d="M 15 0 L 25 4 L 25 12 L 15 8 Z" fill="url(#compactGradient)" opacity="0.8"/>
    <path d="M 5 12 L 15 8 L 25 12 L 15 16 Z" fill="url(#compactGradient)" opacity="0.7"/>
    
    <!-- Center Accent -->
    <circle cx="15" cy="8" r="2" fill="url(#compactAccent)" filter="url(#compactGlow)"/>
    
    <!-- Connection Points -->
    <circle cx="5" cy="4" r="1.5" fill="#1e40af"/>
    <circle cx="25" cy="4" r="1.5" fill="#3b82f6"/>
    <circle cx="5" cy="12" r="1.5" fill="#1e40af"/>
    <circle cx="25" cy="12" r="1.5" fill="#3b82f6"/>
  </g>
</svg>
